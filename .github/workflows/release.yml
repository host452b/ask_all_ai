name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist
          zip -r "dist/askall-v${VERSION}.zip" \
            manifest.json \
            background/ \
            content/ \
            popup/ \
            icons/ \
            LICENSE \
            -x "*.DS_Store" "*__MACOSX*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/askall-*.zip

<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c6aff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="440" height="280" fill="url(#bg)" rx="0"/>
  <!-- decorative circles -->
  <circle cx="380" cy="50" r="120" fill="rgba(124,106,255,0.06)"/>
  <circle cx="60" cy="240" r="80" fill="rgba(124,106,255,0.04)"/>
  <!-- logo -->
  <text x="220" y="100" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="42" font-weight="800" fill="#f0f0f5">
    Ask<tspan fill="url(#accent)">All</tspan>
  </text>
  <!-- tagline -->
  <text x="220" y="140" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="rgba(240,240,245,0.6)">One question, every AI.</text>
  <!-- provider chips -->
  <g font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="500">
    <rect x="60" y="170" width="68" height="26" rx="13" fill="rgba(124,106,255,0.15)" stroke="rgba(124,106,255,0.3)" stroke-width="1"/>
    <text x="94" y="187" text-anchor="middle" fill="#a78bfa">ChatGPT</text>
    <rect x="136" y="170" width="58" height="26" rx="13" fill="rgba(124,106,255,0.15)" stroke="rgba(124,106,255,0.3)" stroke-width="1"/>
    <text x="165" y="187" text-anchor="middle" fill="#a78bfa">Gemini</text>
    <rect x="202" y="170" width="56" height="26" rx="13" fill="rgba(124,106,255,0.15)" stroke="rgba(124,106,255,0.3)" stroke-width="1"/>
    <text x="230" y="187" text-anchor="middle" fill="#a78bfa">Claude</text>
    <rect x="266" y="170" width="44" height="26" rx="13" fill="rgba(124,106,255,0.15)" stroke="rgba(124,106,255,0.3)" stroke-width="1"/>
    <text x="288" y="187" text-anchor="middle" fill="#a78bfa">Grok</text>
    <rect x="318" y="170" width="72" height="26" rx="13" fill="rgba(124,106,255,0.15)" stroke="rgba(124,106,255,0.3)" stroke-width="1"/>
    <text x="354" y="187" text-anchor="middle" fill="#a78bfa">DeepSeek</text>
  </g>
  <g font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="500">
    <rect x="100" y="204" width="48" height="26" rx="13" fill="rgba(124,106,255,0.10)" stroke="rgba(124,106,255,0.2)" stroke-width="1"/>
    <text x="124" y="221" text-anchor="middle" fill="rgba(167,139,250,0.7)">Kimi</text>
    <rect x="156" y="204" width="64" height="26" rx="13" fill="rgba(124,106,255,0.10)" stroke="rgba(124,106,255,0.2)" stroke-width="1"/>
    <text x="188" y="221" text-anchor="middle" fill="rgba(167,139,250,0.7)">Perplexity</text>
    <rect x="228" y="204" width="56" height="26" rx="13" fill="rgba(124,106,255,0.10)" stroke="rgba(124,106,255,0.2)" stroke-width="1"/>
    <text x="256" y="221" text-anchor="middle" fill="rgba(167,139,250,0.7)">Mistral</text>
    <rect x="292" y="204" width="56" height="26" rx="13" fill="rgba(124,106,255,0.10)" stroke="rgba(124,106,255,0.2)" stroke-width="1"/>
    <text x="320" y="221" text-anchor="middle" fill="rgba(167,139,250,0.7)">+17 more</text>
  </g>
  <!-- bottom line -->
  <text x="220" y="260" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="rgba(240,240,245,0.35)">Compare 22+ AI responses side by side</text>
</svg>
